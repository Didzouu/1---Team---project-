<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Appeal Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">HelpDesk</a>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="mb-3">Appeal #{{ appeal.id }}</h1>

      <div class="card">
        <div class="card-body">
          <h5 class="card-title">{{ appeal.title }}</h5>
          <p class="card-text">{{ appeal.description }}</p>
          <p class="text-muted">
            Submitted on {{ appeal.created_at|date:"F j, Y, g:i a" }}
          </p>
        </div>
      </div>

      <a class="btn btn-outline-secondary mt-3" href="{% url 'index' %}">
        Back
      </a>
    </main>
  </body>
</html>
